openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Multi-Tenant Marketing Application API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: tenants
    description: Tenant operations
  - name: categories
    description: Category operations
  - name: assets
    description: Content asset operations
  - name: brandAssetCategories
    description: Brand asset category operations
  - name: brandAssets
    description: Brand asset library operations
  - name: campaigns
    description: Campaign operations
  - name: campaignAssets
    description: Campaign-asset association operations
  - name: socialAccounts
    description: Social account operations
  - name: csv
    description: CSV generation operations
  - name: groundingDocs
    description: AI grounding document operations
  - name: emailGenerator
    description: Promotional email generation operations
  - name: productTags
    description: Product/service offering tag operations
  - name: markets
    description: Market hierarchy operations
  - name: admin
    description: Global admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user and tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories for the current tenant
      parameters:
        - name: market_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryBody"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Category deleted

  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List content assets
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
        - name: market_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
    post:
      operationId: createAsset
      tags: [assets]
      summary: Add a new content asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetBody"
      responses:
        "201":
          description: Asset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get a single asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Asset details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAsset
      tags: [assets]
      summary: Update an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetBody"
      responses:
        "200":
          description: Asset updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
    delete:
      operationId: deleteAsset
      tags: [assets]
      summary: Delete an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Asset deleted

  /assets/{id}/extract:
    post:
      operationId: extractAssetContent
      tags: [assets]
      summary: Run content extraction on an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Extraction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /assets/export-csv:
    get:
      operationId: exportAssetsCsv
      tags: [assets]
      summary: Export tenant assets as CSV file
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string

  /assets/import-csv:
    post:
      operationId: importAssetsCsv
      tags: [assets]
      summary: Upload and validate a CSV file for asset import
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportCsvBody"
      responses:
        "200":
          description: Validation result with parsed rows and unknown categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportCsvValidationResult"

  /assets/confirm-import:
    post:
      operationId: confirmAssetsImport
      tags: [assets]
      summary: Confirm asset import with category decisions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmImportBody"
      responses:
        "200":
          description: Import result summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResultSummary"

  /brand-asset-categories:
    get:
      operationId: listBrandAssetCategories
      tags: [brandAssetCategories]
      summary: List brand asset categories for the current tenant
      parameters:
        - name: market_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of brand asset categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrandAssetCategory"
    post:
      operationId: createBrandAssetCategory
      tags: [brandAssetCategories]
      summary: Create a new brand asset category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandAssetCategoryBody"
      responses:
        "201":
          description: Brand asset category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandAssetCategory"

  /brand-asset-categories/{id}:
    patch:
      operationId: updateBrandAssetCategory
      tags: [brandAssetCategories]
      summary: Update a brand asset category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBrandAssetCategoryBody"
      responses:
        "200":
          description: Brand asset category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandAssetCategory"
    delete:
      operationId: deleteBrandAssetCategory
      tags: [brandAssetCategories]
      summary: Delete a brand asset category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Brand asset category deleted

  /product-tags:
    get:
      operationId: listProductTags
      tags: [productTags]
      summary: List product/service tags for the current tenant
      parameters:
        - name: market_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of product tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductTag"
    post:
      operationId: createProductTag
      tags: [productTags]
      summary: Create a new product tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductTagBody"
      responses:
        "201":
          description: Product tag created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductTag"

  /product-tags/{id}:
    patch:
      operationId: updateProductTag
      tags: [productTags]
      summary: Update a product tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductTagBody"
      responses:
        "200":
          description: Product tag updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductTag"
    delete:
      operationId: deleteProductTag
      tags: [productTags]
      summary: Delete a product tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Product tag deleted

  /product-tags/{id}/assets:
    get:
      operationId: listProductTagAssets
      tags: [productTags]
      summary: List asset IDs assigned to a product tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Asset IDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  assetIds:
                    type: array
                    items:
                      type: integer
                  brandAssetIds:
                    type: array
                    items:
                      type: integer
                required:
                  - assetIds
                  - brandAssetIds
    put:
      operationId: setProductTagAssets
      tags: [productTags]
      summary: Set assets assigned to a product tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assetIds:
                  type: array
                  items:
                    type: integer
                brandAssetIds:
                  type: array
                  items:
                    type: integer
      responses:
        "200":
          description: Assignments updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success

  /markets:
    get:
      operationId: listMarkets
      tags: [markets]
      summary: List markets for the current tenant
      responses:
        "200":
          description: List of markets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Market"
    post:
      operationId: createMarket
      tags: [markets]
      summary: Create a new market
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMarketBody"
      responses:
        "201":
          description: Market created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /markets/{id}:
    get:
      operationId: getMarket
      tags: [markets]
      summary: Get a single market
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Market details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMarket
      tags: [markets]
      summary: Update a market
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMarketBody"
      responses:
        "200":
          description: Market updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMarket
      tags: [markets]
      summary: Archive a market
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Market archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
        "400":
          description: Cannot delete default market
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /brand-assets:
    get:
      operationId: listBrandAssets
      tags: [brandAssets]
      summary: List brand-approved visual assets
      parameters:
        - name: market_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of brand assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrandAsset"
    post:
      operationId: createBrandAsset
      tags: [brandAssets]
      summary: Add a brand asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandAssetBody"
      responses:
        "201":
          description: Brand asset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandAsset"

  /brand-assets/{id}:
    patch:
      operationId: updateBrandAsset
      tags: [brandAssets]
      summary: Update a brand asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBrandAssetBody"
      responses:
        "200":
          description: Brand asset updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandAsset"
    delete:
      operationId: deleteBrandAsset
      tags: [brandAssets]
      summary: Delete a brand asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Brand asset deleted

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, scheduled, active, paused, completed]
        - name: market_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a new campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "201":
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignBody"
      responses:
        "200":
          description: Campaign updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Campaign deleted

  /campaigns/{id}/assets:
    get:
      operationId: listCampaignAssets
      tags: [campaignAssets]
      summary: List assets in a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignAssetDetail"
    post:
      operationId: addCampaignAsset
      tags: [campaignAssets]
      summary: Add an asset to a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCampaignAssetBody"
      responses:
        "201":
          description: Asset added to campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignAssetDetail"

  /campaigns/{campaignId}/assets/{assetId}:
    patch:
      operationId: updateCampaignAsset
      tags: [campaignAssets]
      summary: Update campaign-asset overrides
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: integer
        - name: assetId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignAssetBody"
      responses:
        "200":
          description: Override updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignAssetDetail"
    delete:
      operationId: removeCampaignAsset
      tags: [campaignAssets]
      summary: Remove an asset from a campaign
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: integer
        - name: assetId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Asset removed from campaign

  /social-accounts:
    get:
      operationId: listSocialAccounts
      tags: [socialAccounts]
      summary: List social accounts for the current tenant
      parameters:
        - name: market_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of social accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SocialAccount"
    post:
      operationId: createSocialAccount
      tags: [socialAccounts]
      summary: Add a social account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSocialAccountBody"
      responses:
        "201":
          description: Social account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialAccount"

  /social-accounts/{id}:
    patch:
      operationId: updateSocialAccount
      tags: [socialAccounts]
      summary: Update a social account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSocialAccountBody"
      responses:
        "200":
          description: Social account updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialAccount"
    delete:
      operationId: deleteSocialAccount
      tags: [socialAccounts]
      summary: Delete a social account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Social account deleted

  /campaigns/{id}/generated-posts:
    get:
      operationId: listGeneratedPosts
      tags: [csv]
      summary: List previously generated posts for a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Saved generated posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeneratedPost"
    delete:
      operationId: deleteAllGeneratedPosts
      tags: [csv]
      summary: Delete all generated posts for a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: All posts deleted

  /campaigns/{id}/generated-posts/{postId}:
    put:
      operationId: updateGeneratedPost
      tags: [csv]
      summary: Update a generated post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                postContent:
                  type: string
                dateTime:
                  type: string
                tags:
                  type: ["string", "null"]
                firstComment:
                  type: ["string", "null"]
                imageUrls:
                  type: ["string", "null"]
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedPost"
    delete:
      operationId: deleteGeneratedPost
      tags: [csv]
      summary: Delete a single generated post
      parameters:
        - name: id
          in: path
