        tenantId:
          type: integer
        avatar:
          type: ["string", "null"]
        authProvider:
          type: ["string", "null"]
        emailVerified:
          type: ["boolean", "null"]
        status:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - role
        - tenantId
        - createdAt

    Tenant:
