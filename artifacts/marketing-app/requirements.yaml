packages:
  "framer-motion": "For smooth page transitions and micro-interactions"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "Zod validation resolver for React Hook Form"
  "date-fns": "For formatting dates in the UI"
  "recharts": "For beautiful analytics charts on the dashboard"
  "clsx": "For conditional class name merging"
  "tailwind-merge": "For merging Tailwind CSS classes safely"

images:
  - path: "artifacts/marketing-app/public/images/auth-bg.png"
    description: "Abstract fluid gradient in deep indigo, violet, and soft teal, modern premium SaaS aesthetic"
    aspect_ratio: "16:9"
  - path: "artifacts/marketing-app/public/images/dashboard-hero.png"
    description: "Clean minimal 3D abstract geometric shapes floating, glassmorphism, professional corporate"
    aspect_ratio: "3:4"
  - path: "artifacts/marketing-app/public/images/empty-state.png"
    description: "Minimalist outline illustration of a folder and sparkles, subtle pastel colors, transparent background"
    aspect_ratio: "1:1"

notes:
  - Using generated React Query hooks from @workspace/api-client-react
  - Session-based authentication via cookies
  - Wouter for routing
